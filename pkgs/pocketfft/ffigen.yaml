name: PocketFFTBindings
description: Automatically generated type-safe FFI bindings for native mixed-radix Fast Fourier Transform (FFT) engine.
output: lib/src/pocketfft_bindings.dart
ffi-native:
  asset-id: 'package:pocketfft/pocketfft'
headers:
  entry-points:
    - hook/src/kiss_fft.h
    - hook/src/kiss_fftr.h
preamble: |
  // Automatically generated by ffigen. DO NOT EDIT.
  // ignore_for_file: type=lint, unused_element, unused_field, camel_case_types, non_constant_identifier_names
compiler-opts:
  - '-Dkiss_fft_scalar=double'
comments:
  style: any
  length: full
