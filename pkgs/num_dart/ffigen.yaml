name: NumDartNativeBindings
description: Automatically generated type-safe Dart FFI bindings for package:num_dart custom C extensions.
output: lib/src/numdart_bindings.dart
ffi-native:
  asset-id: 'package:num_dart/num_dart'
headers:
  entry-points:
    - hook/custom_sorting.h
    - hook/custom_ufuncs.h
preamble: |
  // Automatically generated by ffigen. DO NOT EDIT.
  // ignore_for_file: type=lint, unused_element, camel_case_types, non_constant_identifier_names
comments:
  style: any
  length: full
