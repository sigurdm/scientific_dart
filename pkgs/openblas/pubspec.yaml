name: openblas
description: FFI bindings for OpenBLAS.
version: 0.0.1
resolution: workspace
repository: https://github.com/sigurdm/math

environment:
  sdk: ^3.11.5

# Add regular dependencies here.
dependencies:
  ffi: ^2.2.0
  hooks: ^1.0.3
  code_assets: ^1.0.0
  archive: ^3.6.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1
  ffigen: ^20.1.1

ffigen:
  name: OpenBlas
  description: FFI bindings for OpenBLAS.
  output: 'lib/src/openblas_bindings.dart'
  ffi-native:
    asset-id: 'package:openblas/openblas'
  headers:
    entry-points:
      - 'third_party/openblas/openblas_minimal.h'
